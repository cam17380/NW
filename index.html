<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Command Simulator</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<header>
  <h1 data-i18n="ui.appTitle">Network Simulator</h1>
  <div class="device-tabs" id="deviceTabs"></div>
</header>
<div class="toast" id="toast"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg" data-i18n="ui.confirmReset">Are you sure?</p>
    <div class="btn-row">
      <button onclick="closeConfirm()" data-i18n="ui.cancel">Cancel</button>
      <button class="danger" id="confirmOk" onclick="doReset()" data-i18n="ui.reset">Reset</button>
    </div>
  </div>
</div>
<input type="file" id="importFile" accept=".json" style="display:none">

<div class="main-container">
  <div class="terminal-panel">
    <div class="toolbar">
      <div class="toolbar-dropdown">
        <button class="toolbar-btn file" data-i18n="ui.file">File ▾</button>
        <div class="toolbar-dropdown-menu">
          <button onclick="saveConfig()" data-i18n="ui.save">Save</button>
          <button onclick="loadConfig()" data-i18n="ui.load">Load</button>
          <div class="dropdown-sep"></div>
          <button onclick="exportConfig()" data-i18n="ui.exportJson">Export JSON</button>
          <button onclick="importConfig()" data-i18n="ui.importJson">Import JSON</button>
          <div class="dropdown-sep"></div>
          <button onclick="exportScript()" data-i18n="ui.exportCisco">Export Script (Cisco)</button>
          <button onclick="exportYamaha()" data-i18n="ui.exportYamaha">Export Script (YAMAHA)</button>
          <button onclick="exportImage()" data-i18n="ui.exportImage">Export Image</button>
          <div class="dropdown-sep"></div>
          <button onclick="confirmReset()" data-i18n="ui.resetTopology">Reset Topology</button>
          <div class="dropdown-sep"></div>
          <div class="dropdown-info" id="saveInfo"></div>
        </div>
      </div>
      <button class="toolbar-btn template" onclick="showTemplates()" data-i18n="ui.templates">Templates</button>
      <button class="toolbar-btn learn" id="learnBtn" onclick="showLessons()" data-i18n="ui.learn">Learn</button>
      <button class="toolbar-btn challenge" id="challengeBtn" onclick="showChallenges()" data-i18n="ui.challenge">Challenge</button>
      <button class="toolbar-btn design" id="designToggle" data-i18n="ui.designMode">Design Mode</button>
      <button class="toolbar-btn test-mode" id="testModeBtn">Test Mode</button>
      <div class="toolbar-spacer"></div>
      <button class="toolbar-btn lang" id="langToggle" onclick="toggleLang()">JA</button>
    </div>
    <div class="terminal-header">
      <span id="terminalTitle">Terminal — Switch1</span>
      <span id="modeIndicator">User EXEC</span>
    </div>
    <div class="terminal-output" id="termOutput"></div>
    <div class="cmd-hints" id="cmdHints"></div>
    <div class="terminal-input-area">
      <span class="prompt-label" id="promptLabel">Switch1></span>
      <input type="text" id="cmdInput" spellcheck="false" autofocus>
    </div>
  </div>

  <div class="splitter" id="panelSplitter"></div>

  <div class="diagram-panel">
    <canvas id="netCanvas"></canvas>
    <div class="legend" id="legendArea">
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:#69f0ae"></div> <span data-i18n="ui.legendRouter">Router</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffa726"></div> <span data-i18n="ui.legendSwitch">Switch</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef5350"></div> <span data-i18n="ui.legendFirewall">Firewall</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#7e57c2"></div> <span data-i18n="ui.legendServer">Server</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#4fc3f7"></div> <span data-i18n="ui.legendPC">PC</span></div>
        <div class="legend-item"><span style="color:#556;font-size:10px" data-i18n="ui.legendStatus">(bright=All UP / dim=Partial / dark=Down)</span></div>
      </div>
      <div class="legend-row" id="legendRowLinks">
        <div class="legend-item"><div class="legend-line" style="background:#69f0ae"></div> <span data-i18n="ui.legendLinkUp">Link UP</span></div>
        <div class="legend-item"><div class="legend-line" style="background:#555"></div> <span data-i18n="ui.legendLinkDown">Link Down</span></div>
        <div class="legend-item"><div class="legend-line" style="background:repeating-linear-gradient(90deg,#ab47bc,#ab47bc 3px,transparent 3px,transparent 6px)"></div> <span data-i18n="ui.legendTrunk">Trunk</span></div>
      </div>
    </div>
    <div class="help-badge" onclick="toggleHelp()" data-i18n="ui.helpBadge">? Help / Commands</div>
    <div class="help-overlay" id="helpOverlay">
      <button class="help-close" onclick="toggleHelp()" data-i18n="ui.helpClose">Close</button>
      <h2 data-i18n="ui.helpTitle">Available Commands</h2>
      <div id="helpContent"></div>
    </div>
  </div>
</div>

<div id="testModeContainer"></div>
<script type="module" src="src/main.js"></script>
</body>
</html>
